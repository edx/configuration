- name: Validate conductor root redirect URL
  assert:
		that:
			- not CONDUCTOR_REDIRECT_ROOT or (CONDUCTOR_ROOT_REDIRECT_URL | length > 0)
			- not CONDUCTOR_REDIRECT_ROOT or (CONDUCTOR_ROOT_REDIRECT_URL is match('^https://'))
		fail_msg: >-
			CONDUCTOR_ROOT_REDIRECT_URL must be set to an absolute HTTPS URL when
			CONDUCTOR_REDIRECT_ROOT is true.
